[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables will be set in Railway dashboard
# Required variables:
# - APP_KEY (generate with: php artisan key:generate --show)
# - APP_ENV=production
# - APP_DEBUG=false
# - APP_URL (your Railway app URL)
# - DB_CONNECTION=pgsql
# - DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD (from Railway PostgreSQL service)
# - REDIS_HOST, REDIS_PORT, REDIS_PASSWORD (from Railway Redis service)
# - QUEUE_CONNECTION=redis
# - OPENROUTER_API_KEY
# - OPENROUTER_DEFAULT_MODEL
